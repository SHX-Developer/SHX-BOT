services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shx_bot}
      POSTGRES_USER: ${POSTGRES_USER:-shx_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shx_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shx_bot} -d ${POSTGRES_DB:-shx_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
